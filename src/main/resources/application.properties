# ??????????????????????????????????????????
# Database ? SQL Server
# ??????????????????????????????????????????
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=GlassStore;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ??????????????????????????????????????????
# JWT
# ??????????????????????????????????????????
jwt.secret=GlassDB_SuperSecretKey_2024_Group5_ABCDEF
jwt.expiration-ms=86400000

# ??????????????????????????????????????????
# File Upload
# ??????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ??????????????????????????????????????????
# Pagination
# ??????????????????????????????????????????
spring.data.web.pageable.default-page-size=12
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# ??????????????????????????????????????????
# Swagger / OpenAPI
# ??????????????????????????????????????????
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# ??????????????????????????????????????????
# Scheduling
# ??????????????????????????????????????????
spring.task.scheduling.pool.size=2

# ??????????????????????????????????????????
# Logging
# ??????????????????????????????????????????
spring.security.debug=false
logging.level.org.springframework.security=WARN
logging.level.org.group5.springmvcweb=INFO
spring.jpa.open-in-view=false

# ??????????????????????????????????????????
# VNPay
# ??????????????????????????????????????????
vnpay.tmn-code=YOUR_TMN_CODE
vnpay.hash-secret=YOUR_HASH_SECRET
vnpay.payment-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:8080/api/payment/vnpay/callback
vnpay.frontend-url=http://localhost:5173

# ??????????????????????????????????????????
# Email ? Gmail SMTP
# Huong dan:
#   1. Dang nhap Gmail -> Security -> 2-Step Verification (bat)
#   2. App Passwords -> Tao mat khau ung dung cho "Mail"
#   3. Dien mat khau ung dung (16 ky tu) vao spring.mail.password
#
# Hoac dung Mailtrap (sandbox mien phi):
#   spring.mail.host=sandbox.smtp.mailtrap.io
#   spring.mail.port=2525
#   spring.mail.username=YOUR_MAILTRAP_USER
#   spring.mail.password=YOUR_MAILTRAP_PASS
# ??????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password-16-chars
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Ten hien thi trong email gui di
app.mail.from-name=GlassStore
# Bat/tat gui email (false khi dev de khong spam)
app.mail.enabled=false